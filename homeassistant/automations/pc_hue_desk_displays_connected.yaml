# PC desk Hue Play — turn on when either Mac connects an external display.
# Requires: script.pc_hue_desk_on (scripts/pc_hue_desk_on.yaml)
alias: PC desk - Hue on when external display connected
description: ""
mode: single
triggers:
  - trigger: state
    entity_id:
      - sensor.macbook_akqa_displays
      - sensor.personal_macbook_displays
conditions:
  - condition: template
    value_template: >-
      {{ states('sensor.macbook_akqa_displays') | int(0) > 1
         or states('sensor.personal_macbook_displays') | int(0) > 1 }}
  - condition: state
    entity_id: light.hue_play_1
    state: "off"
actions:
  - action: script.pc_hue_desk_on
