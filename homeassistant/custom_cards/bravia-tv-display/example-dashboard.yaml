# Bravia TV Display — Example Lovelace config
#
# Setup:
#   1. cd homeassistant/custom_cards/bravia-tv-display && npm install && npm run build
#   2. Copy dist/bravia-tv-display.js → config/www/bravia-tv-display/bravia-tv-display.js
#   3. Copy assets/*                  → config/www/bravia-tv-display/assets/
#   4. Add resource: /local/bravia-tv-display/bravia-tv-display.js (JavaScript Module)
#   5. Add this card via Manual/Code editor

type: custom:bravia-tv-display
entity: media_player.android_tv_192_168_11_26
# 🖼️ TV background (deploy: look for this line in logs)
image: /local/bravia-tv-display/assets/bravia-tv.png

