<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bravia TV Remote – Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 24px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0e0e0e; color: #ccc; min-height: 100vh;
    }
    h1 { font-size: 1.2rem; margin: 0 0 4px; font-weight: 500; }
    .meta { margin: 0 0 16px; font-size: 0.72rem; color: #555; }
    .preview-wrap { max-width: 360px; margin: 0 auto; }
    ha-card {
      display: block; background: var(--ha-card-background, #0c0c0c);
      border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .status {
      margin-top: 14px; font-size: 0.68rem; color: #444; line-height: 1.6;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .status span { color: #888; }
  </style>
</head>
<body>
  <div class="preview-wrap">
    <h1>Bravia TV Remote</h1>
    <p class="meta">Full remote control with ADB commands</p>
    <bravia-tv-remote id="card"></bravia-tv-remote>
    <div class="status" id="status">Click any button — check the console for ADB calls</div>
  </div>
  <script type="module">
    import './src/bravia-tv-remote.ts';
    const card = document.getElementById('card');
    const ENTITY = 'media_player.android_tv_192_168_11_26';
    card.setConfig({ entity: ENTITY });
    card.hass = {
      states: { [ENTITY]: { state:'playing', attributes:{ is_volume_muted:false, volume_level:0.5, media_title:'Lofi Girl \u2013 beats to relax/study to', media_artist:'Lofi Girl', app_id:'com.google.android.youtube.tv', app_name:'YouTube', entity_picture:'https://lh3.googleusercontent.com/ynylFjbVJFoHMzuiX_dMp2x5QFAhuGV3IFQRleHEjBXKaNMKTwfGMHmw=' } } },
      callService(domain, service, data) {
        const cmd = data?.command || '';
        console.log(`[HA] ${domain}.${service}`, cmd);
        document.getElementById('status').innerHTML = `Last: <span>${domain}.${service}</span> → <span>${cmd || JSON.stringify(data)}</span>`;
      }
    };
  </script>
</body>
</html>
