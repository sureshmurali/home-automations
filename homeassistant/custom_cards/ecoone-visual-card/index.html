<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eco One Visual Card – Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0e0e0e;
      color: #ccc;
      min-height: 100vh;
    }
    h1 { font-size: 1.2rem; margin: 0 0 4px; font-weight: 500; }
    .meta { margin: 0 0 16px; font-size: 0.72rem; color: #555; }
    .preview-wrap { max-width: 580px; margin: 0 auto; }
    ha-card {
      display: block;
      background: var(--ha-card-background, #1a1a1a);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .controls {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .controls button {
      padding: 6px 14px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #666;
      cursor: pointer;
      font-size: 0.72rem;
      transition: all 150ms ease;
    }
    .controls button:hover { background: #222; }
    .controls button.active { border-color: #f90; color: #f90; }
    .controls button.active-blue { border-color: #5bc; color: #5bc; }
    .controls button.active-red { border-color: #e55; color: #e55; }
    .controls button.active-dim { border-color: #555; color: #888; }
    .slider-group {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-group label {
      font-size: 0.68rem;
      color: #666;
      min-width: 110px;
    }
    .slider-group input[type="range"] {
      flex: 1;
      accent-color: #f90;
    }
    .slider-group.cold input[type="range"] { accent-color: #5bc; }
    .slider-group .val {
      font-size: 0.68rem;
      color: #f90;
      min-width: 48px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .slider-group.cold .val { color: #5bc; }

    .color-row {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .color-row label {
      font-size: 0.68rem;
      color: #666;
      min-width: 110px;
    }
    .color-row input[type="color"] {
      width: 32px; height: 24px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #1a1a1a;
      cursor: pointer;
      padding: 0;
    }
    .color-row .hex {
      font-size: 0.62rem;
      color: #555;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .section-label {
      margin: 18px 0 6px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .section-label.hot { color: #f90; }
    .section-label.cold { color: #5bc; }
    .section-label.colors { color: #999; }
    .section-label.anim { color: #b89cff; }

    .status {
      margin-top: 14px;
      font-size: 0.68rem;
      color: #444;
      line-height: 1.6;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .status span { color: #888; }
  </style>
</head>
<body>
  <div class="preview-wrap">
    <h1>Eco One Visual Card</h1>
    <p class="meta">Local preview — toggle states and tune design tokens live</p>

    <ecoone-visual-card id="card"></ecoone-visual-card>

    <!-- State toggles -->
    <div class="controls">
      <button id="btn-heating" class="active" onclick="toggle('heating')">Heating</button>
      <button id="btn-supply" class="active-blue" onclick="toggle('supply')">Supplying</button>
      <button id="btn-fault" onclick="toggle('fault')">Fault</button>
      <button id="btn-off" onclick="toggle('off')">System Off</button>
    </div>

    <!-- Tank sliders -->
    <div class="slider-group">
      <label>Hot water</label>
      <input type="range" id="fill-slider" min="0" max="120" value="40" oninput="setFill(this.value)" />
      <span class="val" id="fill-val">40 L</span>
    </div>
    <div class="slider-group">
      <label>Tank capacity</label>
      <input type="range" id="cap-slider" min="10" max="150" value="70" oninput="setCap(this.value)" />
      <span class="val" id="cap-val">70 L</span>
    </div>

    <!-- Animation controls -->
    <p class="section-label anim">Animations</p>
    <div class="slider-group">
      <label>Fill duration</label>
      <input type="range" id="fill-dur" min="0.5" max="15" value="4" step="0.5" oninput="setVar('--ecoone-tank-fill-duration', this.value + 's', 'fill-dur-val', this.value + 's')" />
      <span class="val" id="fill-dur-val">4s</span>
    </div>
    <div class="slider-group">
      <label>Wave height (%)</label>
      <input type="range" id="wave-h" min="0" max="10" value="1" step="0.5" oninput="setVar('--ecoone-wave-height', this.value, 'wave-h-val', this.value + '%')" />
      <span class="val" id="wave-h-val">1%</span>
    </div>
    <div class="slider-group">
      <label>Wave speed (s)</label>
      <input type="range" id="wave-dur" min="1" max="12" value="1" step="0.5" oninput="setVar('--ecoone-wave-duration', this.value, 'wave-dur-val', this.value + 's')" />
      <span class="val" id="wave-dur-val">1s</span>
    </div>

    <!-- Hot bubble controls -->
    <p class="section-label hot">Hot Bubbles</p>
    <div class="slider-group">
      <label>Count</label>
      <input type="range" id="hot-count" min="0" max="100" value="93" step="1" oninput="setVar('--ecoone-hot-bubble-count', this.value, 'hot-count-val', this.value)" />
      <span class="val" id="hot-count-val">93</span>
    </div>
    <div class="slider-group">
      <label>Base size</label>
      <input type="range" id="hot-size" min="3" max="20" value="4" step="1" oninput="setVar('--ecoone-hot-bubble-base-size', this.value + 'px', 'hot-size-val', this.value + 'px')" />
      <span class="val" id="hot-size-val">4px</span>
    </div>
    <div class="slider-group">
      <label>Speed (duration)</label>
      <input type="range" id="hot-dur" min="0.5" max="8" value="3.8" step="0.1" oninput="setVar('--ecoone-hot-bubble-base-duration', this.value + 's', 'hot-dur-val', this.value + 's')" />
      <span class="val" id="hot-dur-val">3.8s</span>
    </div>
    <div class="slider-group">
      <label>Peak opacity</label>
      <input type="range" id="hot-opa" min="0.1" max="1" value="0.92" step="0.02" oninput="setVar('--ecoone-hot-bubble-peak-opacity', this.value, 'hot-opa-val', this.value)" />
      <span class="val" id="hot-opa-val">0.92</span>
    </div>
    <div class="color-row">
      <label>Fill</label>
      <input type="color" id="hot-fill-c" value="#fff0dc" oninput="setColorVar('--ecoone-hot-bubble-fill', this.value, 0.55, 'hot-fill-hex')" />
      <span class="hex" id="hot-fill-hex">#fff0dc</span>
    </div>
    <div class="color-row">
      <label>Shadow</label>
      <input type="color" id="hot-shadow-c" value="#ff6428" oninput="setColorVar('--ecoone-hot-bubble-shadow', this.value, 0.28, 'hot-shadow-hex')" />
      <span class="hex" id="hot-shadow-hex">#ff6428</span>
    </div>

    <!-- Cold bubble controls -->
    <p class="section-label cold">Cold Bubbles</p>
    <div class="slider-group cold">
      <label>Count</label>
      <input type="range" id="cold-count" min="0" max="100" value="7" step="1" oninput="setVar('--ecoone-cold-bubble-count', this.value, 'cold-count-val', this.value)" />
      <span class="val" id="cold-count-val">7</span>
    </div>
    <div class="slider-group cold">
      <label>Base size</label>
      <input type="range" id="cold-size" min="2" max="14" value="5" step="1" oninput="setVar('--ecoone-cold-bubble-base-size', this.value + 'px', 'cold-size-val', this.value + 'px')" />
      <span class="val" id="cold-size-val">5px</span>
    </div>
    <div class="slider-group cold">
      <label>Speed (duration)</label>
      <input type="range" id="cold-dur" min="1" max="12" value="4.5" step="0.1" oninput="setVar('--ecoone-cold-bubble-base-duration', this.value + 's', 'cold-dur-val', this.value + 's')" />
      <span class="val" id="cold-dur-val">4.5s</span>
    </div>
    <div class="slider-group cold">
      <label>Peak opacity</label>
      <input type="range" id="cold-opa" min="0.1" max="1" value="0.65" step="0.02" oninput="setVar('--ecoone-cold-bubble-peak-opacity', this.value, 'cold-opa-val', this.value)" />
      <span class="val" id="cold-opa-val">0.65</span>
    </div>
    <div class="color-row">
      <label>Fill</label>
      <input type="color" id="cold-fill-c" value="#b4dcff" oninput="setColorVar('--ecoone-cold-bubble-fill', this.value, 0.35, 'cold-fill-hex')" />
      <span class="hex" id="cold-fill-hex">#b4dcff</span>
    </div>
    <div class="color-row">
      <label>Shadow</label>
      <input type="color" id="cold-shadow-c" value="#50a0dc" oninput="setColorVar('--ecoone-cold-bubble-shadow', this.value, 0.15, 'cold-shadow-hex')" />
      <span class="hex" id="cold-shadow-hex">#50a0dc</span>
    </div>

    <!-- SVG color controls -->
    <p class="section-label colors">Tank Colors</p>
    <div class="color-row">
      <label>Hot water fill</label>
      <input type="color" id="tank-hot-c" value="#ff7139" oninput="setColorVar('--ecoone-svg-tank-hot-fill', this.value, 0.6, 'tank-hot-hex')" />
      <span class="hex" id="tank-hot-hex">#ff7139</span>
    </div>
    <div class="color-row">
      <label>Cold water fill</label>
      <input type="color" id="tank-cold-c" value="#93e4ff" oninput="setColorVar('--ecoone-svg-tank-cold-fill', this.value, 0.33, 'tank-cold-hex')" />
      <span class="hex" id="tank-cold-hex">#93e4ff</span>
    </div>
    <div class="color-row">
      <label>Warm glow</label>
      <input type="color" id="glow-c" value="#ff9632" oninput="setColorVar('--ecoone-color-warm-glow-inner', this.value, 0.06, 'glow-hex')" />
      <span class="hex" id="glow-hex">#ff9632</span>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script type="module">
    import './src/ecoone-visual-card.ts';

    const card = document.getElementById('card');

    const mockState = {
      heating: true,
      supply: true,
      fault: false,
      off: false,
      fill: 40,
      capacity: 70,
    };

    const ENTITIES = {
      fault:     'binary_sensor.omron_fault_status_4',
      supply:    'sensor.omron_hot_water_supply_status',
      heating:   'sensor.omron_water_heating_status',
      operation: 'binary_sensor.omron_operation_status',
      capacity:  'sensor.omron_tank_capacity',
      remaining: 'sensor.omron_measured_amount_of_hot_water_remaining_in_tank',
    };

    card.setConfig({
      image: './assets/EcoOneIllustration.png',
      entities: {
        fault:                ENTITIES.fault,
        supply_status:        ENTITIES.supply,
        heating_status:       ENTITIES.heating,
        operation_status:     ENTITIES.operation,
        tank_capacity_l:      ENTITIES.capacity,
        hot_water_remaining_l: ENTITIES.remaining,
      },
    });

    function buildHass() {
      return {
        states: {
          [ENTITIES.fault]:     { state: mockState.fault ? 'on' : 'off' },
          [ENTITIES.supply]:    { state: mockState.supply ? 'Supplying Hot Water' : 'Stopped' },
          [ENTITIES.heating]:   { state: mockState.heating ? 'Heating' : 'not heating' },
          [ENTITIES.operation]: { state: mockState.off ? 'off' : 'on' },
          [ENTITIES.capacity]:  { state: String(mockState.capacity) },
          [ENTITIES.remaining]: { state: String(mockState.fill) },
        },
      };
    }

    function refresh() {
      card.hass = buildHass();

      document.getElementById('btn-heating').className = mockState.heating ? 'active' : '';
      document.getElementById('btn-supply').className  = mockState.supply  ? 'active-blue' : '';
      document.getElementById('btn-fault').className    = mockState.fault   ? 'active-red' : '';
      document.getElementById('btn-off').className      = mockState.off     ? 'active-dim' : '';

      const pct = mockState.capacity > 0
        ? Math.round((mockState.fill / mockState.capacity) * 100)
        : 0;

      document.getElementById('status').innerHTML =
        `operation: <span>${mockState.off ? 'off' : 'on'}</span>  ` +
        `heating: <span>${mockState.heating ? 'Heating' : 'not heating'}</span>  ` +
        `supply: <span>${mockState.supply ? 'Supplying' : 'Stopped'}</span><br>` +
        `fault: <span>${mockState.fault ? 'ON' : 'off'}</span>  ` +
        `tank: <span>${mockState.fill}L / ${mockState.capacity}L (${pct}%)</span>`;
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    window.toggle = function(key) {
      mockState[key] = !mockState[key];
      refresh();
    };

    window.setFill = function(val) {
      mockState.fill = Number(val);
      document.getElementById('fill-val').textContent = val + ' L';
      refresh();
    };

    window.setCap = function(val) {
      mockState.capacity = Number(val);
      document.getElementById('cap-val').textContent = val + ' L';
      refresh();
    };

    window.setVar = function(varName, value, labelId, labelText) {
      card.style.setProperty(varName, value);
      document.getElementById(labelId).textContent = labelText;
      card.requestUpdate();
    };

    window.setColorVar = function(varName, hex, alpha, labelId) {
      card.style.setProperty(varName, hexToRgba(hex, alpha));
      document.getElementById(labelId).textContent = hex;
      card.requestUpdate();
    };

    refresh();
  </script>
</body>
</html>
