<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar House Card – Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, sans-serif;
      background: #121212;
      color: #e0e0e0;
      min-height: 100vh;
    }
    h1 { font-size: 1.25rem; margin: 0 0 8px 0; }
    .preview-wrap {
      max-width: 420px;
      margin: 0 auto;
    }
    .meta {
      margin: 0 0 12px 0;
      font-size: 0.8rem;
      color: #888;
    }
    ha-card {
      display: block;
      background: var(--ha-card-background, #1c1c1c);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div class="preview-wrap">
    <h1>Solar House Card</h1>
    <p class="meta">Battery: 72% &middot; Solar: 1.2 kW &middot; Grid: 846 kWh</p>
    <solar-house-card id="card"></solar-house-card>
  </div>

  <script type="module">
    import './src/solar-house-card.ts';

    const card = document.getElementById('card');

    card.setConfig({
      preview: true,
      image: './homeIllustration.png',
      show_flow_line: true,
    });

    card.hass = { states: {} };
  </script>
</body>
</html>
