alias: Solar battery – Kitchen mini light (mapped brightness)
description: >-
  Set kitchen mini green brightness from battery % with configurable min/max.
  Uses transition for smooth ramp.
mode: single
variables:
  solar_battery_entity: sensor.solar_31_remaining_stored_electricity_3
  kitchen_mini_light: light.mini
  light_color:
    - 30
    - 50
  battery_min: 0
  battery_max: 100
  brightness_min: 0
  brightness_max: 50
  transition_sec: 2
sequence:
  - variables:
      battery: "{{ states(solar_battery_entity) | default(0) | int(0) }}"
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ battery < battery_min }}"
        sequence:
          - action: light.turn_off
            target:
              entity_id: "{{ kitchen_mini_light }}"
            data:
              transition: "{{ transition_sec }}"
    default:
      - variables:
          battery_clamped: "{{ [battery_max, [battery_min, battery] | max] | min }}"
          span_battery: "{{ (battery_max - battery_min) | float }}"
          span_brightness: "{{ (brightness_max - brightness_min) | float }}"
          brightness_pct: >-
            {{ ((brightness_min + (battery_clamped - battery_min) / span_battery
            * span_brightness) | round(0) | int) if span_battery != 0 else
            brightness_max }}
      - action: light.turn_on
        target:
          entity_id: "{{ kitchen_mini_light }}"
        data:
          hs_color: "{{ light_color }}"
          brightness_pct: "{{ brightness_pct }}"
          transition: "{{ transition_sec }}"
