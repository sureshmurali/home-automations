# Home Assistant script: Next train to Aoto and Keisei-Ueno (Ohanajaya)
# Requires Home Assistant timezone set to Asia/Tokyo (Settings > General > Time zone).
# On Japanese national holidays (including weekday holidays) the weekend schedule is used.
# Next train = first departure after (now + walk_minutes) so you have time to walk to the station.
alias: Alexa - Next train time
description: Announce next train to Aoto and Keisei-Ueno based on weekday/weekend/holiday and Japan time.
mode: single

